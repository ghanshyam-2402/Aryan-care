document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

der=\"Family email\" value=\"{{ email }}\" sc-camel-on-change=\"{{ emailChange }}\" style=\"background:var(--card);border:1.5px solid var(--line2);border-radius:14px;padding:14px 16px;font-size:15px;font-weight:600;color:var(--ink);outline:none;\">\n      <input type=\"password\" placeholder=\"Password\" value=\"{{ pw }}\" sc-camel-on-change=\"{{ pwChange }}\" style=\"background:var(--card);border:1.5px solid var(--line2);border-radius:14px;padding:14px 16px;font-size:15px;font-weight:600;color:var(--ink);outline:none;\">\n      <sc-if value=\"{{ authMsg }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:var(--red);text-align:center;\">{{ authMsg }}<\u002Fdiv><\u002Fsc-if>\n      <div sc-camel-on-click=\"{{ signIn }}\" style=\"background:var(--teal);color:#fff;border-radius:16px;padding:16px 0;text-align:center;font-size:15.5px;font-weight:700;cursor:pointer;\" style-active=\"transform:scale(0.98)\">Sign in<\u002Fdiv>\n      <div sc-camel-on-click=\"{{ signUp }}\" style=\"text-align:center;font-size:13px;color:var(--teal);font-weight:700;cursor:pointer;padding:4px;\">First time? Create the shared family account<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isIn }}\" hint-placeholder-val=\"{{ false }}\">\n  <!-- ===== DASHBOARD ===== -->\n  <sc-if value=\"{{ isDash }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"animation:viewIn 0.22s ease;flex:1;overflow-y:auto;padding:22px 18px 20px;display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n        <div><div style=\"font-size:13px;color:var(--muted);\">{{ todayLabel }}<\u002Fdiv><div style=\"font-size:25px;font-weight:800;letter-spacing:-0.01em;\">{{ greeting }}<\u002Fdiv><\u002Fdiv>\n        <div sc-camel-on-click=\"{{ goSettings }}\" style=\"width:42px;height:42px;border-radius:14px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;cursor:pointer;\">A<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ reminderShow }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:var(--amberbg);border:1px solid var(--amberbd);border-radius:18px;padding:13px 16px;display:flex;align-items:center;gap:13px;\">\n          <div style=\"width:9px;height:40px;border-radius:6px;background:var(--amber);flex:none;\"><\u002Fdiv>\n          <div style=\"flex:1;min-width:0;\"><div style=\"font-size:13.5px;font-weight:700;color:var(--amberink);\">Reminder · medicines pending<\u002Fdiv><div style=\"font-size:12px;color:var(--amberink2);margin-top:1px;\">{{ reminderCount }} dose(s) not logged yet today<\u002Fdiv><\u002Fdiv>\n          <div sc-camel-on-click=\"{{ goMeds }}\" style=\"background:var(--amber);color:#fff;border-radius:11px;padding:9px 13px;font-size:12px;font-weight:700;cursor:pointer;\">Log now<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div sc-camel-on-click=\"{{ goMeds }}\" style=\"background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px 18px;cursor:pointer;\" style-active=\"transform:scale(0.985)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;\"><div style=\"font-size:15px;font-weight:700;\">Today’s medicines<\u002Fdiv><div style=\"font-size:12.5px;color:var(--teal);font-weight:600;\">{{ medsSummary }}<\u002Fdiv><\u002Fdiv>\n        <sc-if value=\"{{ hasDashMeds }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:9px;\">\n            <sc-for list=\"{{ dashMeds }}\" as=\"m\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:12px;\">\n                <div style=\"width:24px;height:24px;border-radius:8px;background:{{ m.boxBg }};border:1.5px solid {{ m.boxBd }};display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex:none;\">{{ m.mark }}<\u002Fdiv>\n                <div style=\"flex:1;font-size:14.5px;font-weight:600;\">{{ m.name }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:var(--muted);white-space:nowrap;\">{{ m.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px;height:6px;border-radius:99px;background:var(--soft);overflow:hidden;\"><div style=\"height:100%;border-radius:99px;background:var(--teal);transition:width 0.4s;width:{{ medsPct }};\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noDashMeds }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:var(--faint);\">No medicines yet — tap to add the first one<\u002Fdiv><\u002Fsc-if>\n        <sc-if value=\"{{ dashMedsAllDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:14px;color:var(--teal);font-weight:700;\">✓ All of today’s doses are given<\u002Fdiv>\n          <div style=\"margin-top:12px;height:6px;border-radius:99px;background:var(--soft);overflow:hidden;\"><div style=\"height:100%;border-radius:99px;background:var(--teal);width:100%;\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n        <div sc-camel-on-click=\"{{ goTherapy }}\" style=\"background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px 16px;cursor:pointer;\"><div style=\"font-size:12px;color:var(--muted);margin-bottom:4px;\">Therapy today<\u002Fdiv><div style=\"font-size:16px;font-weight:700;\">{{ dashTherapyTitle }}<\u002Fdiv><div style=\"font-size:12.5px;color:{{ dashTherapySubColor }};font-weight:600;margin-top:2px;\">{{ dashTherapySub }}<\u002Fdiv><\u002Fdiv>\n        <div sc-camel-on-click=\"{{ goSeiz }}\" style=\"background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px 16px;cursor:pointer;\"><div style=\"font-size:12px;color:v   <sc-for list=\"{{ quickActions }}\" as=\"q\" hint-placeholder-count=\"5\">\n            <div sc-camel-on-click=\"{{ q.go }}\" style=\"background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 4px;text-align:center;cursor:pointer;\" style-active=\"transform:scale(0.94)\">\n              <div style=\"width:36px;height:36px;border-radius:12px;background:{{ q.bg }};margin:0 auto 6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;\">+<\u002Fdiv>\n              <div style=\"font-size:11.5px;font-weight:600;\">{{ q.name }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;\">Today<\u002Fdiv>\n        <sc-if value=\"{{ hasTimeline }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;\">\n            <sc-for list=\"{{ timeline }}\" as=\"e\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:12px;\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;\"><div style=\"width:8px;height:8px;border-radius:50%;background:{{ e.dot }};margin-top:5px;flex:none;\"><\u002Fdiv><div style=\"flex:1;width:1.5px;background:var(--line2);\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"padding-bottom:14px;\"><div style=\"font-size:13.5px;font-weight:600;\">{{ e.text }}<\u002Fdiv><div style=\"font-size:11.5px;color:var(--muted);\">{{ e.time }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noTimeline }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:var(--card);border:1px dashed var(--knob);border-radius:16px;padding:18px;text-align:center;font-size:13px;color:var(--faint);\">Nothing logged yet today<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== MEDICINES ===== -->\n  <sc-if value=\"{{ isMeds }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:viewIn 0.22s ease;flex:1;overflow-y:auto;padding:22px 18px 20px;display:flex;flex-direction:column;gap:14px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;\"><div style=\"font-size:25px;font-weight:800;\">Medicines<\u002Fdiv><div style=\"font-size:12.5px;color:var(--muted);\">{{ todayShort }}<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;background:var(--soft);border-radius:99px;padding:3px;\">\n        <sc-for list=\"{{ medsSegOpts }}\" as=\"o\" hint-placeholder-count=\"2\"><div sc-camel-on-click=\"{{ o.pick }}\" style=\"flex:1;background:{{ o.bg }};color:{{ o.fg }};border-radius:99px;padding:9px 0;text-align:center;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:{{ o.sh }};\">{{ o.t }}<\u002Fdiv><\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ isTodayTab }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <input type=\"date\" value=\"{{ medsDateVal }}\" max=\"{{ todayIso }}\" sc-camel-on-change=\"{{ medsDateChange }}\" style=\"background:var(--card);border:1.5px solid var(--line2);border-radius:12px;padding:9px 12px;font-size:13px;font-weight:700;color:var(--ink);\">\n          <div style=\"font-size:12.5px;color:var(--muted);flex:1;\">{{ medsDateHint }}<\u002Fdiv>\n          <sc-if value=\"{{ medsNotToday }}\" hint-placeholder-val=\"{{ false }}\"><div sc-camel-on-click=\"{{ medsToToday }}\" style=\"background:var(--tealbg);border:1px solid var(--tealbd);color:var(--teal);border-radius:99px;padding:8px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;\">Today<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasSlots }}\" hint-placeholder-val=\"{{ true }}\">\n          <sc-for list=\"{{ slots }}\" as=\"slot\" hint-placeholder-count=\"2\">\n            <div>\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;\">\n                <div style=\"font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);\">{{ slot.title }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:{{ slot.stateColor }};font-weight:600;\">{{ slot.state }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px;\">\n                <sc-for list=\"{{ slot.meds }}\" as=\"m\" hint-placeholder-count=\"2\">\n                  <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:13px;\">\n                    <div style=\"width:10px;height:38px;border-radius:6px;background:{{ m.color }};flex:none;\"><\u002Fdiv>\n                    <div sc-camel-on-click=\"{{ m.openDetail }}\" style=\"flex:1;cursor:pointer;min-width:0;\"><div style=\"font-size:15.5px;font-weight:700;\">{{ m.name }}<\u002Fdiv><div style=\"font-size:12.5px;color:var(--muted);\">{{ m.doseText }}<\u002Fdiv><\u002Fdiv>\n                    <sc-if value=\"{{ m.logged }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div sc-camel-on-click=\"{{ m.undo }}\" style=\"background:{{ m.logBg }};border:1px solid {{ m.logBd }};color:{{ m.logFg }};border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;\">{{ m.logText }}<\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ m.pending }}\" hint-placeholder-val=\"{{ true }}\">\n                      <div style=\"display:flex;gap:6px;\">\n                        <div sc-camel-on-click=\"{{ m.take }}\" style=\"background:var(--teal);color:#fff;border-radius:12px;padding:12px 16px;font-size:13.5px;font-weight:700;cursor:pointer;\" style-active=\"transform:scale(0.93)\">Taken<\u002Fdiv>\n                        <div sc-camel-on-click=\"{{ m.miss }}\" style=\"background:var(--card);border:1px solid var(--line2);color:var(--muted);border-radius:12px;padding:12px 13px;font-size:13.5px;font-weight:600;cursor:pointer;\">Missed<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noSlots }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:var(--card);border:1px dashed var(--knob);border-radius:16px;padding:20px;text-align:center;font-size:13px;color:var(--faint);\">No medicines scheduled this day.<br>Add one from the All medicines tab.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isAllTab }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n          <sc-for list=\"{{ allMeds }}\" as=\"m\" hint-placeholder-count=\"3\">\n            <div sc-camel-on-click=\"{{ m.openDetail }}\" style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;\" style-active=\"transform:scale(0.985)\">\n              <div style=\"width:10px;height:40px;border-radius:6px;background:{{ m.color }};flex:none;\"><\u002Fdiv>\n              <div style=\"flex:1;\"><div style=\"font-size:15.5px;font-weight:700;\">{{ m.name }}<\u002Fdiv><div style=\"font-size:12.5px;color:var(--muted);\">{{ m.summary }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:right;\"><div style=\"font-size:13px;font-weight:800;color:var(--teal);\">{{ m.compliance }}<\u002Fdiv><div style=\"font-size:10.5px;color:var(--faint);\">30-day<\u002Fdiv><\ 02Fdiv>\n      <div><div style=\"font-size:19px;font-weight:800;\">{{ visitSheetTitle }}<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-size:12px;color:var(--muted);margin-bottom:6px;\">Visit date · past dates OK<\u002Fdiv>\n      <input type=\"date\" value=\"{{ visitDateVal }}\" max=\"{{ todayIso }}\" sc-camel-on-change=\"{{ visitDateChange }}\" style=\"width:100%;background:var(--card);border:1.5px solid var(--line2);border-radius:12px;padding:11px 12px;font-size:13px;font-weight:700;color:var(--ink);\"><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;\">\n        <input type=\"text\" placeholder=\"Doctor name\" value=\"{{ visitDoctorVal }}\" sc-camel-on-change=\"{{ visitDoctorChange }}\" style=\"background:var(--card);border:1.5px solid var(--line2);border-radius:12px;padding:12px 14px;font-size:13.5px;font-weight:700;color:var(--ink);outline:none;min-width:0;\">\n        <input type=\"text\" placeholder=\"Specialization · hospital\" value=\"{{ visitSpecVal }}\" sc-camel-on-change=\"{{ visitSpecChange }}\" style=\"background:var(--card);border:1.5px solid var(--line2);border-radius:12px;padding:12px 14px;font-size:13.5px;font-weight:600;color:var(--ink);outline:none;min-width:0;\">\n      <\u002Fdiv>\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;\">\n        <div style=\"display:flex;align-items:baseline;gap:6px;\"><div style=\"font-size:11px;color:var(--muted);\">Weight<\u002Fdiv><input type=\"number\" step=\"0.1\" min=\"0\" value=\"{{ visitWeight }}\" sc-camel-on-change=\"{{ visitWeightChange }}\" style=\"width:70px;background:transparent;border:none;border-bottom:1.5px solid var(--line2);font-size:18px;font-weight:800;color:var(--ink);outline:none;padding:0;\">kg<\u002Fdiv>\n        <div style=\"display:flex;gap:6px;\">\n          <div sc-camel-on-click=\"{{ weightDec }}\" style=\"width:34px;height:34px;border-radius:11px;background:var(--soft);color:var(--sub);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;cursor:pointer;\">−<\u002Fdiv>\n          <div sc-camel-on-click=\"{{ weightInc }}\" style=\"width:34px;height:34px;border-radius:11px;background:var(--tealbg);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;cursor:pointer;\">+<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <input type=\"text\" placeholder=\"Doctor notes (optional)\" value=\"{{ visitNotesVal }}\" sc-camel-on-change=\"{{ visitNotesChange }}\" style=\"background:var(--card);border:1.5px solid var(--line2);border-radius:14px;padding:13px 15px;font-size:14px;font-weight:600;color:var(--ink);outline:none;\">\n      <div><div style=\"font-size:12px;color:var(--muted);margin-bottom:6px;\">Next appointment · optional<\u002Fdiv>\n      <input type=\"date\" value=\"{{ visitNextVal }}\" min=\"{{ todayIso }}\" sc-camel-on-change=\"{{ visitNextChange }}\" style=\"width:100%;background:var(--card);border:1.5px solid var(--line2);border-radius:12px;padding:11px 12px;font-size:13px;font-weight:700;color:var(--ink);\"><\u002Fdiv>\n      <div sc-camel-on-click=\"{{ saveVisit }}\" style=\"background:var(--amber);color:#fff;border-radius:16px;padding:16px 0;text-align:center;font-size:15.5px;font-weight:700;cursor:pointer;\" style-active=\"transform:scale(0.98)\">Save visit<\u002Fdiv>\n      <sc-if value=\"{{ visitEditing }}\" hint-placeholder-val=\"{{ false }}\">\n        <div sc-camel-on-click=\"{{ deleteVisit }}\" style=\"text-align:center;font-size:13px;font-weight:700;color:var(--red);cursor:pointer;padding:2px 0;\">Delete this visit<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== APPOINTMENT SHEET ===== -->\n  <sc-if value=\"{{ apptSheetOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeApptSheet }}\" style=\"position:absolute;inset:0;background:rgba(28,36,34,0.45);animation:fadeIn 0.2s;z-index:10;\"><\u002Fdiv>\n    <div style=\"position:absolute;left:0;right:0;bottom:0;background:var(--bg);border-radius:26px 26px 0 0;padding:10px 20px 26px;display:flex;flex-direction:column;gap:14px;animation:sheetUp 0.25s;z-index:11;\">\n      <div style=\"width:40px;height:5px;border-radius:99px;background:var(--knob);margin:0 auto;\"><\u002Fdiv>\n      <div><div style=\"font-size:19px;font-weight:800;\">Upcoming appointment<\u002Fdiv><div style=\"font-size:13px;color:var(--muted);\">Just the appointment — no visit record is created<\u002Fdiv><\u002Fdiv>\n      <input type=\"date\" value=\"{{ apptDateVal }}\" min=\"{{ todayIso }}\" sc-camel-on-change=\"{{ apptDateChange }}\" style=\"width:100%;background:var(--card);border:1.5px solid var(--tealbd);border-radius:12px;padding:12px;font-size:14px;font-weight:700;color:var(--ink);\">\n      <input type=\"text\" placeholder=\"Doctor name · specialization\" value=\"{{ apptDoctorVal }}\" sc-camel-on-change=\"{{ apptDoctorChange }}\" style=\"background:var(--card);border:1.5px solid var(--line2);border-radius:12px;padding:13px 14px;font-size:14px;font-weight:700;color:var(--ink);outline:none;\">\n      <div sc-camel-on-click=\"{{ saveAppt }}\" style=\"background:var(--teal);color:#fff;border-radius:16px;padding:16px 0;text-align:center;font-size:15.5px;font-weight:700;cursor:pointer;\" style-active=\"transform:scale(0.98)\">Save appointment<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TOAST ===== -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;bottom:86px;left:50%;transform:translateX(-50%);background:var(--chipOn);color:#fff;border-radius:99px;padding:11px 20px;font-size:13px;font-weight:600;white-space:nowrap;animation:toastUp 0.25s;z-index:20;box-shadow:0 6px 20px rgba(0,0,0,0.25);\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    auth: 'loading', email: '', pw: '', authMsg: null, loadingMsg: 'Connecting…',\n    view: 'dash', tab: 'today', detailId: null,\n    medsDate: null, progDate: null, therDate: null, // set on mount to today\n    data: { meds: [], schedules: [], logs: [], therapy: [], seizures: [], progress: [], visits: [], settings: null },\n    therapyDraft: { loc: 'Home', dur: 45, coop: null, note: '' }, therSheetOpen: false,\n    progressDraft: { fever: 'None', sleep: 'Good', appetite: 'Good', mood: 'Normal' },\n    sleepDraft: 10,\n    sheetOpen: false, sheetFrom: null, sheetDoses: { m: 0, a: 0, e: 0, n: 0 },\n    stopSheetOpen: false, stopFrom: null,\n    addMedOpen: false, addMedDraft: { name: '', unit: 'ml', doses: { m: 0, a: 0, e: 0, n: 0 } },\n    seizSheetOpen: false, seizEditId: null, seizDraft: { date: null, time: '', dur: '~45s', type: null, note: '' },\n    visitSheetOpen: false, visitEditId: null, visitDraft: { date: null, doctor: '', spec: '', weight: 11.0, notes: '', next: '' },\n    apptSheetOpen: false, apptDraft: { date: '', doctor: '' },\n    toast: null, theme: 'System', sysDark: false, calMonthOff: 0, calSel: null,\n  };\n  iso(d) { const p = (n) => String(n).padStart(2, '0'); return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()); }\n  todayIso() { return this.iso(new Date()); }\n  addDays(iso, n) { const d = new Date(iso + 'T12:00:00'); d.setDate(d.getDate() + n); return this.iso(d); }\n  fmt(iso, withYear) {\n    if (!iso) return '';\n    const d = new Date(iso + 'T12:00:00');\n    const s = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });\n    return withYear ? s + ' ' + d.getFullYear() : s;\n  }\n  nowStr() { return new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }).toLowerCase(); }\n  nowHM() { const d = new Date(), p = (n) => String(n).padStart(2, '0'); return p(d.getHours()) + ':' + p(d.getMinutes()); }\n  showToast(msg) { clearTimeout(this._tt); this.setState({ toast: msg }); this._tt = setTimeout(() => this.setState({ toast: null }), 2400); }\n  componentDidMount() {\n    const T = this.todayIso();\n    this.setState({ medsDate: T, progDate: T, therDate: T, calSel: T, theme: localStorage.getItem('ac_theme') || 'System' });\n    this._mql = window.matchMedia('(prefers-color-scheme: dark)');\n    this._mqlFn = () => this.setState({ sysDark: this._mql.matches });\n    this._mql.addEventListener('change', this._mqlFn);\n    this.setState({ sysDark: this._mql.matches });\n    window.addEventListener('focus', this._focusFn = () => { if (this.state.auth === 'in') this.loadAll(); });\n    const boot = () => {\n      if (!window.supabase) { setTimeout(boot, 150); return; }\n      this.sb = window.supabase.createClient(\n        'https://ffqwuwylvpiglvvhuabn.supabase.co',\n        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmcXd1d3lsdnBpZ2x2dmh1YWJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NjU2NDcsImV4cCI6MjEwMDA0MTY0N30.KMf78aQ0RuhWsDV1mtD_4iVqaMljm0xRG7-jnycFRhY');\n      this.sb.auth.getSession().then(({ data }) => {\n        if (data && data.session) { this.setState({ auth: 'in', userEmail: data.session.user.email }); this.loadAll(); this.subscribeRealtime(); }\n        else this.setState({ auth: 'login' });\n      }).catch(() => this.setState({ auth: 'login' }));\n    };\n    boot();\n  }\n  componentWillUnmount() {\n    if (this._mql) this._mql.removeEventListener('change', this._mqlFn);\n    window.removeEventListener('focus', this._focusFn);\n    clearTimeout(this._tt);\n    if (this._chan && this.sb) this.sb.removeChannel(this._chan);\n  }\n  subscribeRealtime() {\n    try {\n      this._chan = this.sb.channel('ac-db')\n        .on('postgres_changes', { event: '*', schema: 'public' }, () => this.loadAll())\n        .subscribe();\n    } catch (e) { /* realtime optional */ }\n  }\n  async loadAll() {\n    if (!this.sb) return;\n    const T = this.todayIso();\n    const from30 = this.addDays(T, -32);\n    const [meds, schedules, logs, therapy, seizures, progress, visits, settings] = await Promise.all([\n      this.sb.from('medicines').select('*').order('created_at'),\n      this.sb.from('schedules').select('*').order('effective_from'),\n      this.sb.from('med_logs').select('*').gte('date', this.addDays(T, -95)),\n      this.sb.from('therapy').select('*').order('date', { ascending: false }).limit(60),\n      this.sb.from('seizures').select('*').order('date', { ascending: false }).limit(200),\n      this.sb.from('progress').select('*').order('date', { ascending: false }).limit(60),\n      this.sb.from('visits').select('*').order('date', { ascending: false }),\n      this.sb.from('settings').select('*').eq('id', 1).maybeSingle(),\n    ]);\n    const err = [meds, schedules, logs, therapy, seizures, progress, visits, settings].find(r => r.error);\n    if (err && err.error) { this.showToast('Load failed: ' + err.error.message); return; }\n    this.setState({ data: {\n      meds: meds.data || [], schedules: schedules.data || [], logs: logs.data || [],\n      therapy: therapy.data || [], seizures: seizures.data || [], progress: progress.data || [],\n      visits: visits.data || [], settings: settings.data || null } });\n  }\n  async db(promise, okMsg) {\n    const { error } = await promise;\n    if (error) { this.showToast('Save failed: ' + error.message); return false; }\n    if (okMsg) this.showToast(okMsg);\n    this.loadAll();\n    return true;\n  }\n  activeSchedule(medId, dateIso) {\n    const list = this.state.data.schedules.filter(s => s.medicine_id === medId && s.effective_from <= dateIso);\n    if (!list.length) return null;\n    return list.reduce((a, b) => a.effective_from >= b.effective_from ? a : b);\n  }\n  renderVals() {\n    const st = this.state, D = st.data;\n    const T = st.medsDate ? this.todayIso() : null; // null until mount\n    if (!T) return { isLoading: true, auth.signInWithPassword({ email: st.email.trim(), password: st.pw });\n          if (e2) { this.setState({ authMsg: 'Account created — confirm the email Supabase sent you, then sign in. (Tip: disable \"Confirm email\" in Supabase → Authentication → Providers.)' }); return; }\n          this.setState({ auth: 'in', userEmail: data.user.email }); this.loadAll(); this.subscribeRealtime();\n        } };\n    }\n    // ---------- medicines ----------\n    const slotDefs = [\n      { key: 'm', title: 'Morning', label: 'Morning' }, { key: 'a', title: 'Afternoon', label: 'Afternoon' },\n      { key: 'e', title: 'Evening', label: 'Evening' }, { key: 'n', title: 'Night', label: 'Night' }];\n    const logFor = (medId, dateIso, slot) => D.logs.find(l => l.medicine_id === medId && l.date === dateIso && l.slot === slot);\n    const buildSlots = (dateIso) => slotDefs.map(sd => {\n      const meds = D.meds.map(med => {\n        const sch = this.activeSchedule(med.id, dateIso);\n        if (!sch || !+sch[sd.key]) return null;\n        const lg = logFor(med.id, dateIso, sd.key);\n        const missed = lg && lg.status === 'missed';\n        return { name: med.name, color: med.color || teal, doseText: +sch[sd.key] + ' ' + med.unit,\n          logged: !!lg, pending: !lg,\n          logText: lg ? (missed ? '✕ missed' : '✓ ' + (lg.at_label || 'done')) : '',\n          logBg: missed ? 'var(--redbg)' : 'var(--tealbg)', logBd: missed ? 'var(--redbd)' : 'var(--tealbd)', logFg: missed ? 'var(--red)' : teal,\n          take: () => this.db(this.sb.from('med_logs').upsert({ medicine_id: med.id, date: dateIso, slot: sd.key, status: 'taken', dose: +sch[sd.key], at_label: this.nowStr() }, { onConflict: 'medicine_id,date,slot' }), 'Marked taken'),\n          miss: () => this.db(this.sb.from('med_logs').upsert({ medicine_id: med.id, date: dateIso, slot: sd.key, status: 'missed', dose: +sch[sd.key], at_label: this.nowStr() }, { onConflict: 'medicine_id,date,slot' }), 'Marked missed'),\n          undo:
